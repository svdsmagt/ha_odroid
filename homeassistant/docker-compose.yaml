# https://www.home-assistant.io/installation/alternative/
services:
  homeassistant:
    container_name: homeassistant
    image: "ghcr.io/home-assistant/home-assistant:stable"
    volumes:
      - ./config:/config
      - /etc/localtime:/etc/localtime:ro
      - /run/dbus:/run/dbus:ro
    restart: unless-stopped
    privileged: true
    ports:
      - "8123:8123"   # Home Assistant Web GUI
      - "5353:5353"   # mDNS/Bonjour discovery
    environment:
      TZ: Europe/Amsterdam
      # Explicitly disable supervisor mode to avoid errors
      DISABLE_JEMALLOC: true
      # Prevent supervisor-related integrations from loading
      SUPERVISOR: ""
      # Container mode flags
      HASSIO: ""
      HOMEASSISTANT_CONTAINER: "1"
      # Reduce internal logging to save space
      HASS_LOG_LEVEL: "warning"
    network_mode: bridge
    # Add labels for better container management
    labels:
      - "com.docker.compose.service=homeassistant"
      - "homeassistant=true"
    # Limit logging to save space on eMMC
    logging:
      driver: "json-file"
      options:
        max-size: "10m"      # Maximum 10MB per log file
        max-file: "2"        # Keep only 2 log files (20MB total)
    # Add health check to monitor container status
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8123/api/", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s